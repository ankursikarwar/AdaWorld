model:
  image_channels: 3

  lam_model_dim: 1024
  lam_latent_dim: 32
  lam_patch_size: 16
  lam_enc_blocks: 16
  lam_dec_blocks: 16
  lam_num_heads: 16

  beta: 0.0002
  log_interval: 1000
  log_path: /network/scratch/a/ankur.sikarwar/WORLD_MODEL_PROJECT/lam/exp_imgs_game
  optimizer:
    class_path: torch.optim.AdamW
    init_args:
      lr: 2.5e-5
      weight_decay: 1e-2

data:
  batch_size: 40
  data_root: ../data
  env_source: game
  padding: repeat
  randomize: true
  resolution: 256
  num_frames: 2
  output_format: t h w c
  samples_per_epoch: 10000000
  sampling_strategy: pi

trainer:
  max_epochs: 1000
  accelerator: gpu
  num_nodes: 1
  devices: 0,1,2,3
  strategy: ddp_find_unused_parameters_false
  precision: 16-mixed
  log_every_n_steps: 1000
  accumulate_grad_batches: 1
  gradient_clip_val: 0.3

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: /network/scratch/a/ankur.sikarwar/WORLD_MODEL_PROJECT/lam/exp_ckpts_game_v1
        verbose: true
        save_last: true
        save_top_k: -1

  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: /network/scratch/a/ankur.sikarwar/WORLD_MODEL_PROJECT/lam/exp_logs
        name: lam_game
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: adaworld-lam
        name: lam_game_4gpu
        id: lam-game-4gpu-v1
        resume: allow
        save_dir: /network/scratch/a/ankur.sikarwar/WORLD_MODEL_PROJECT/lam/exp_logs
